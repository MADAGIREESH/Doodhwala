<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doodhwala — Enterprise Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#F5EFE3;--bg-warm:#EEE5D2;--ink:#1A1410;--ink-soft:#4A3F33;--muted:#8A7F71;--line:#D9CFBC;--card:#FFFFFF;--primary:#0F5132;--primary-soft:#E6EFE8;--accent:#C8821E;--accent-soft:#FBEFD8;--rose:#B8484C;--rose-soft:#F7E1E2;--blue:#2F5D8A;--blue-soft:#E2EAF3;--purple:#6B4A8C;--purple-soft:#EDE5F2}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}
.display{font-family:'Fraunces',serif;letter-spacing:-0.02em}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 10%,rgba(200,130,30,0.06) 0%,transparent 40%),radial-gradient(circle at 80% 90%,rgba(15,81,50,0.05) 0%,transparent 40%);pointer-events:none;z-index:0}
.container{max-width:1500px;margin:0 auto;padding:32px 24px;position:relative;z-index:2}
.phone{width:340px;height:730px;background:#0a0a0a;border-radius:44px;padding:10px;box-shadow:0 30px 60px -20px rgba(26,20,16,0.35),0 12px 28px -8px rgba(26,20,16,0.2);flex-shrink:0}
.phone-screen{width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.phone-notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:88px;height:22px;background:#0a0a0a;border-radius:999px;z-index:30}
.status-bar{height:36px;padding:0 24px 0 28px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;flex-shrink:0;z-index:5}
.status-icons{display:flex;gap:5px;align-items:center}
.status-icons svg{width:14px;height:14px}
.screen-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;position:relative}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 6px}
.icon-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative}
.icon-btn:hover{background:var(--bg-warm)}
.icon-btn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--rose);border-radius:50%;border:2px solid var(--card)}
.drawer-backdrop{position:absolute;inset:0;background:rgba(26,20,16,0.5);z-index:40;opacity:0;pointer-events:none;transition:opacity 0.25s}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:absolute;top:0;left:0;bottom:0;width:86%;background:var(--bg);z-index:50;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:28px 22px 18px;background:var(--card);border-bottom:1px solid var(--line)}
.drawer-section{padding:12px 14px}
.drawer-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:var(--muted);padding:8px 8px 6px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;cursor:pointer;transition:background 0.15s}
.drawer-item:hover,.drawer-item.active{background:var(--card)}
.drawer-item.active{background:var(--ink);color:var(--bg)}
.drawer-item .icon-wrap{width:30px;height:30px;border-radius:8px;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink-soft)}
.drawer-item.active .icon-wrap{background:rgba(255,255,255,0.12);color:var(--bg)}
.drawer-item .badge{margin-left:auto;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;background:var(--rose-soft);color:var(--rose)}
.drawer-item .label{font-size:13px;font-weight:500}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600}
.section-title{font-family:'Fraunces',serif;font-weight:500;font-size:17px;letter-spacing:-0.02em}
.stat-cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
.stat-val{font-family:'Fraunces',serif;font-weight:500;font-size:22px;letter-spacing:-0.02em;line-height:1;margin-top:4px}
.stat-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;color:var(--muted)}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.list-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.list-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.greet{font-size:11px;color:var(--muted);font-weight:500}
.greet-name{font-family:'Fraunces',serif;font-size:24px;font-weight:500;letter-spacing:-0.025em;line-height:1.1;margin-top:2px}
.btn{padding:12px 16px;border:none;border-radius:12px;font-family:'DM Sans';font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-dark{background:var(--ink);color:var(--bg)}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft)}
.btn-block{width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.3s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.page-header{display:flex;align-items:center;gap:10px;padding:12px 14px 6px}
.page-title{font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-0.02em;flex:1}
.intro{text-align:center;padding:30px 0 22px}
.intro h1{font-family:'Fraunces',serif;font-size:clamp(34px,4.5vw,50px);font-weight:400;letter-spacing:-0.035em;line-height:1;margin:0 0 14px}
.intro h1 em{font-style:italic;color:var(--primary);font-weight:400}
.intro p{color:var(--ink-soft);max-width:660px;font-size:15px;line-height:1.6;margin:0 auto}
.phones-stage{display:flex;justify-content:center;align-items:flex-start;padding:22px 0 50px;gap:28px;flex-wrap:wrap}
.demo-label{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;background:var(--ink);color:var(--bg);font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:14px}
.date-input{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-family:'DM Sans';font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 13px;border-radius:999px;font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.invoice-paper{background:#FFFCF6;border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:0 4px 12px rgba(26,20,16,0.06)}
.inv-row{display:flex;justify-content:space-between;padding:6px 0;font-size:11px}
.inv-th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.fab{position:absolute;bottom:24px;right:18px;width:52px;height:52px;border-radius:18px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(26,20,16,0.3);cursor:pointer;z-index:5}
</style>
</head>

          <div key={p.role}>
            <div style={{textAlign:'center', marginBottom:12}}>
              <div style={{display:'inline-flex', alignItems:'center', gap:7, padding:'6px 12px', borderRadius:999, background:p.tint, color:'#fff', fontSize:11, fontWeight:700, letterSpacing:'0.04em', textTransform:'uppercase'}}>{p.label}</div>
              <div style={{fontSize:11, color:'var(--muted)', marginTop:5, fontWeight:500}}>{p.sub}</div>
            </div>
            <div className="phone">
              <div className="phone-screen">
                <div className="phone-notch"></div>
                {loggedIn[p.role] ? <p.Comp/> : (<><StatusBar/><Login role={p.role} onLogin={()=>setLoggedIn(s=>({...s, [p.role]:true}))}/></>)}
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{maxWidth:960, margin:'0 auto', padding:'22px 26px', background:'var(--card)', border:'1px solid var(--line)', borderRadius:18}}>
        <div className="display" style={{fontSize:22, fontWeight:500, marginBottom:14}}>What's new in v2</div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(230px, 1fr))', gap:16, fontSize:13, lineHeight:1.6, color:'var(--ink-soft)'}}>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>💳 Payment tiers (Owner)</div>
            Per-customer access: Monthly postpaid (trusted), Weekly, Daily, Prepaid only, or Blocked. With credit limit, credit-used progress, and auto credit-score per customer. <em>Owner → Customers → Payment terms & credit</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>📣 Announcements</div>
            Owner composes offers, holiday notices, price changes, festival wishes. Audience: all customers / route / payment tier / agents. Channels: WhatsApp + SMS + push + email. <em>Owner → Engage → Announcements</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>⚠️ Complaints & quality</div>
            Customer files quality issue with photo proof → owner sees → refund / replace / credit. Categories: quality, wrong item, damage, late, missed delivery, agent behavior. <em>Customer → My orders → Report a problem</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>🗓️ Holiday & closures</div>
            Owner marks shop closed dates (Diwali, weddings, maintenance). Customers auto-notified 24h before. Standing orders auto-skip. <em>Owner → Operations → Holiday & closures</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>🔄 Agent leave & swap</div>
            Agent requests leave → owner sees → picks best substitute (proximity + rating + availability). Route handover with one tap. <em>Owner → Operations → Agent leave & swap</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>👨‍👩‍👧 Family linked accounts</div>
            One bill, one wallet, multiple people. Husband/wife/parents place orders to the same account. <em>Customer → Account → Family members</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>🚚 Delivery edge cases</div>
            Customer not home / refused / wrong address / safety / vehicle issue — agent reports with photo, decides retry/reschedule/cancel. <em>Delivery → Operations → Report issue</em>
          </div>
          <div>
            <div style={{fontWeight:700, color:'var(--ink)', marginBottom:4}}>🔔 Live announcements feed</div>
            Customers see all owner announcements with offers, closures, price changes. Agents see their own feed (stock alerts, schedule changes). <em>Customer/Agent → Notifications</em>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
